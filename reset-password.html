<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen bg-black flex items-center justify-center">

  <div class="bg-zinc-900 p-8 rounded-2xl w-full max-w-sm flex flex-col gap-4">
    <h1 class="text-white text-2xl font-bold text-center" id="title">Forgot Password</h1>
    <p id="msg" class="text-sm hidden"></p>

    <!-- Step 1: Send reset link -->
    <div id="step-send">
      <div class="flex flex-col gap-4">
        <input type="email" id="email" placeholder="Enter your email"
          class="bg-zinc-800 text-white rounded-lg px-4 py-2 outline-none" />
        <button onclick="sendResetLink()"
          class="bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2 rounded-lg">
          Send Reset Link
        </button>
        <a href="index.html" class="text-zinc-400 hover:text-white text-sm text-center">← Back to Login</a>
      </div>
    </div>

    <!-- Step 2: Set new password (shown after redirect from email) -->
    <div id="step-reset" class="hidden flex-col gap-4">
      <input type="password" id="newpass" placeholder="Enter new password"
        class="bg-zinc-800 text-white rounded-lg px-4 py-2 outline-none" />
      <button onclick="changePassword()"
        class="bg-pink-500 hover:bg-pink-600 text-white font-semibold py-2 rounded-lg">
        Change Password
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://jayhnleiiaymcszafbet.supabase.co'
    const SUPABASE_KEY = 'sb_publishable_5dJHMxRNMJM_T62UFu6Tmw_oDFGwOak'
    const { createClient } = supabase
    const client = createClient(SUPABASE_URL, SUPABASE_KEY)

    function showMsg(text, isError = false) {
      const el = document.getElementById('msg')
      el.textContent = text
      el.className = `text-sm ${isError ? 'text-red-400' : 'text-green-400'}`
      el.classList.remove('hidden')
    }

    // If Supabase redirected here with a recovery token, show the new password form
    client.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('step-send').classList.add('hidden')
        document.getElementById('step-reset').classList.remove('hidden')
        document.getElementById('step-reset').classList.add('flex')
        document.getElementById('title').textContent = 'Set New Password'
      }
    })

    let countdownTimer = null

    async function sendResetLink() {
      const email = document.getElementById('email').value.trim()
      if (!email) return showMsg('Please enter your email.', true)
      const btn = document.querySelector('#step-send button')
      btn.disabled = true
      btn.textContent = 'Sending...'
      const { error } = await client.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.href
      })
      if (error) {
        showMsg(error.message, true)
        btn.disabled = false
        btn.textContent = 'Send Reset Link'
        return
      }
      // Start 60s countdown
      let seconds = 60
      showMsg(`Reset link sent! Resend in ${seconds}s`)
      btn.disabled = true
      if (countdownTimer) clearInterval(countdownTimer)
      countdownTimer = setInterval(() => {
        seconds--
        if (seconds <= 0) {
          clearInterval(countdownTimer)
          btn.disabled = false
          btn.textContent = 'Send Reset Link'
          showMsg('You can resend the link now.')
        } else {
          showMsg(`Reset link sent! Resend in ${seconds}s`)
          btn.textContent = `Resend in ${seconds}s`
        }
      }, 1000)
    }

    async function changePassword() {
      const newPassword = document.getElementById('newpass').value
      if (!newPassword) return showMsg('Please enter a new password.', true)
      const { error } = await client.auth.updateUser({ password: newPassword })
      if (error) {
        showMsg(error.message, true)
      } else {
        showMsg('Password updated! Redirecting...')
        setTimeout(() => window.location.href = 'index.html', 2000)
      }
    }
  </script>

</body>
</html>
